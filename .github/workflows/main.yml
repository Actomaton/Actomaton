# https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions
# https://github.com/actions/runner-images/tree/main/images/macos
# https://github.com/actions/runner-images/tree/main/images/ubuntu
name: CI

on:
  push:
    branches:
      - main
      - ci/**
  pull_request:

jobs:
  swiftformat:
    name: SwiftFormat lint
    runs-on: ubuntu-latest
    container: swift:6.2
    steps:
      - uses: actions/checkout@v4
      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: swiftformat-${{ hashFiles('Package.resolved') }}
          restore-keys: swiftformat-
      - name: Lint
        run: swift package plugin --allow-writing-to-package-directory swiftformat --lint
        env:
          SWIFTFORMAT: 1

  xcode-build:
    name: Xcode build ${{ matrix.platform }}
    runs-on: macos-26
    strategy:
      matrix:
        xcode: ["26.4"]
        platform: ["iOS", "macOS", "watchOS", "tvOS", "visionOS"]
    steps:
    - uses: actions/checkout@v4
    - name: Select Xcode ${{ matrix.xcode }}
      run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app
    - name: Build ${{ matrix.platform }} package
      run: make xcode-build OS=${{ matrix.platform}}

  ubuntu:
    name: Ubuntu test
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    strategy:
      matrix:
        swift:
          - '6.2'
    steps:
      - uses: actions/checkout@v4

      - name: Install make
        run: apt-get update && apt-get install -y make

      - name: Build Ubuntu package
        run: TEST_CLOCK=1 make swift-test

  wasm:
    name: Wasm test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Swift 6.2.1
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2.1"

      - name: Install Wasm SDK
        run: |
          swift sdk install \
            --checksum 482b9f95462b87bedfafca94a092cf9ec4496671ca13b43745097122d20f18af \
            https://download.swift.org/swift-6.2.1-release/wasm-sdk/swift-6.2.1-RELEASE/swift-6.2.1-RELEASE_wasm.artifactbundle.tar.gz

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"

      - name: Cache SPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: wasm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: wasm-${{ runner.os }}-

      - name: Build Wasm package
        run: make wasm-build WASM_SWIFT=swift WASM_SWIFT_SELECTOR= WASM_SWIFT_SDK=swift-6.2.1-RELEASE_wasm

      - name: Test Wasm package
        run: make wasm-test WASM_SWIFT=swift WASM_SWIFT_SELECTOR= WASM_SWIFT_SDK=swift-6.2.1-RELEASE_wasm

  required:
    name: Required
    needs:
      - swiftformat
      - xcode-build
      - ubuntu
      - wasm
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        env:
          NEEDS: ${{ toJson(needs) }}
        run: |
          ! echo "$NEEDS" | jq -e 'to_entries[] | { job: .key, result: .value.result } | select((.result == "success" or .result == "skipped") | not)'
